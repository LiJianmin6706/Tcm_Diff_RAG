                    }

                {
                    "content": "\u6c14\u7684\u9632\u5fa1\u4f5c\u7528\uff0c\u6307\u6c14\u536b\u62a4\u822a\u80a4\uff0c\u6297\u8861\u90aa\u6c14\u7684\u4f5c\u7528\u3002\u6c14\u7684\u9632\u4f5c\u7528\uff0c\u53ef\u4ee5\u62b5\u8861\u5916\u90aa\u7684\u4eba\u4fb5 \u300a\u7d20\u95ee\u00b7\u6cd5\u8bba\uff08\u9057\u7bc7\uff09\u300b\u8bf4\uff1a\u201c\u6b63\u6c14\u5b58\u5185\uff0c\u90aa\u4e0d\u53ef\u5e72\u3002\u201d\u53e6\u4e00\u65b9\u9762\uff0c\u53ef\u9a71\u90aa\u5916\u51fa\u3002\u6c14\u7684\u9632\u8861\u529f\u80fd\u6b63 \u5e38\uff0c\u90aa\u6c14\u4e0d\u6613\u4fb5\u4eba\uff1a\u5373\u4fbf\u4fb5\u5165\uff0c\u4e5f\u4e0d\u6613\u53d1\u75c5\uff1a\u5373\u4f7f\u53d1\u75c5\uff0c\u4e5f\u6613\u4e8e\u6cbb\u6108\u3002\n\n\u6c14\u7684\u9632\u5fa1\u529f\u80fd\u51cf\u5f31\uff0c\u673a\u4f53\u62b5\u5fa1\u90aa\u6c14\u80fd\u529b\u4e0b\u964d\u3002\u4e00\u65b9\u9762\uff0c\u6613\u67d3\u75be\u75c5\uff0c\u6545\u300a\u7cfb\u95ee\u00b7\u8bc4\u70ed\u75c5\u8bba\u300b \u8bf4\uff1a\u201c\u90aa\u4e4b\u6240\uff0c\u5176\u6c14\u5fc5\u865a\u3002\u201d\u53e6\u4e00\u65b9\u9762\uff0c\u60e0\u75c5\u540e\u96be\u4ee5\u901f\u6108\u3002\u6240\u4ee5\uff0c\u6c14\u7684\u9632\u5fa1\u529f\u80fd\u4e0e\u75be\u75c5\u7684\u53d1\u751f\u3001 \u53d1\u5c55\u4e0e\u8f6c\u5f52\u6709\u770b\u5bc6\u5207\u7684\u5173\u7cfb\u3002\n\n",
                    "id": "\u4e2d\u533b\u57fa\u7840\u7406\u8bba\u5b66--\u7b2c\u56db\u7ae0 \u7cbe\u6c14\u8840\u6d25\u6db2\u795e--\u7b2c\u4e8c\u8282 \u6c14--\u56db\u3001\u4eba\u4f53\u4e4b\u6c14\u7684\u529f\u80fd--\uff08\u4e09\uff09\u9632\u5fa1\u4f5c\u7528",
                    "name": "\uff08\u4e09\uff09\u9632\u5fa1\u4f5c\u7528",
                    "itemStyle": {
                        "color": "blue"
                    },
                    "tooltip": {
                        "position": "right",
                        "formatter": "\u4e2d\u533b\u57fa\u7840\u7406\u8bba\u5b66--\u7b2c\u56db\u7ae0 \u7cbe\u6c14\u8840\u6d25\u6db2\u795e--\u7b2c\u4e8c\u8282 \u6c14--\u56db\u3001<br>\u4eba\u4f53\u4e4b\u6c14\u7684\u529f\u80fd--\uff08\u4e09\uff09\u9632\u5fa1\u4f5c\u7528<br><br>\u6c14\u7684\u9632\u5fa1\u4f5c\u7528<br>\uff0c\u6307\u6c14\u536b\u62a4\u822a\u80a4\uff0c\u6297\u8861\u90aa\u6c14\u7684\u4f5c\u7528\u3002\u6c14\u7684\u9632\u4f5c\u7528\uff0c\u53ef\u4ee5\u62b5\u8861\u5916\u90aa\u7684\u4eba<br>\u4fb5 \u300a\u7d20\u95ee\u00b7\u6cd5\u8bba\uff08\u9057\u7bc7\uff09\u300b\u8bf4\uff1a\u201c\u6b63\u6c14\u5b58\u5185\uff0c\u90aa\u4e0d\u53ef\u5e72\u3002\u201d\u53e6\u4e00\u65b9<br>\u9762\uff0c\u53ef\u9a71\u90aa\u5916\u51fa\u3002\u6c14\u7684\u9632\u8861\u529f\u80fd\u6b63 \u5e38\uff0c\u90aa\u6c14\u4e0d\u6613\u4fb5\u4eba\uff1a\u5373\u4fbf\u4fb5\u5165\uff0c<br>\u4e5f\u4e0d\u6613\u53d1\u75c5\uff1a\u5373\u4f7f\u53d1\u75c5\uff0c\u4e5f\u6613\u4e8e\u6cbb\u6108\u3002\n\n\u6c14\u7684\u9632\u5fa1\u529f\u80fd\u51cf\u5f31\uff0c\u673a\u4f53<br>\u62b5\u5fa1\u90aa\u6c14\u80fd\u529b\u4e0b\u964d\u3002\u4e00\u65b9\u9762\uff0c\u6613\u67d3\u75be\u75c5\uff0c\u6545\u300a\u7cfb\u95ee\u00b7\u8bc4\u70ed\u75c5\u8bba\u300b \u8bf4<br>\uff1a\u201c\u90aa\u4e4b\u6240\uff0c\u5176\u6c14\u5fc5\u865a\u3002\u201d\u53e6\u4e00\u65b9\u9762\uff0c\u60e0\u75c5\u540e\u96be\u4ee5\u901f\u6108\u3002\u6240\u4ee5\uff0c\u6c14\u7684<br>\u9632\u5fa1\u529f\u80fd\u4e0e\u75be\u75c5\u7684\u53d1\u751f\u3001 \u53d1\u5c55\u4e0e\u8f6c\u5f52\u6709\u770b\u5bc6\u5207\u7684\u5173\u7cfb\u3002\n\n"
                    }
                },
                {
                    "content": "\u7740\u60c5\u5fd7\u4e0d\u8212\uff0c\u809d\u90c1\u5316\u706b\uff0c\u90aa\u70ed\u90c1\u84b8\uff0c\u9053\u6d25\u5916\u6cc4\uff0c\u8868\u73b0\u4e3a\u814b\u4e0b\u3001\u9634\u90e8\u6c57\u51fa\uff0c\u751a\u6216 \u8863\u670d\u9ec4\u67d3\u3002\u82e5\u601d\u8651\u70e6\u52b3\u8fc7\u5ea6\uff0c\u8017\u4f24\u5fc3\u8840\uff0c\u9634\u8840\u4e0d\u8db3\uff0c\u865a\u706b\u5185\u751f\uff0c\u8feb\u6d25\u5916\u6cc4\uff0c\u800c\u81f4\u6c57\u51fa\uff0c\u8868\u73b0\u4e3a\u76d7 \u6c57\u6216\u81ea\u6c57\u3002\n\n",
                    "id": "\u4e2d\u533b\u5185\u79d1\u5b66--\u7b2c\u5341\u7ae0 \u6c14\u8840\u6d25\u6db2\u75c5\u8bc1--\u7b2c\u4e94\u8282 \u6c57 \u8bc1--\u3010\u75c5\u56e0\u75c5\u673a\u3011--\uff08\u4e00\uff09\u75c5\u56e0--2.\u60c5\u60a3\u5931\u8c03",
                    "name": "2.\u60c5\u60a3\u5931\u8c03",
                    "itemStyle": {
                        "color": "blue"
                    },
                    "tooltip": {
                        "position": "right",
                        "formatter": "\u4e2d\u533b\u5185\u79d1\u5b66--\u7b2c\u5341\u7ae0 \u6c14\u8840\u6d25\u6db2\u75c5\u8bc1--\u7b2c\u4e94\u8282 \u6c57 \u8bc1--\u3010\u75c5<br>\u56e0\u75c5\u673a\u3011--\uff08\u4e00\uff09\u75c5\u56e0--2.\u60c5\u60a3\u5931\u8c03<br><br>\u7740\u60c5\u5fd7<br>\u4e0d\u8212\uff0c\u809d\u90c1\u5316\u706b\uff0c\u90aa\u70ed\u90c1\u84b8\uff0c\u9053\u6d25\u5916\u6cc4\uff0c\u8868\u73b0\u4e3a\u814b\u4e0b\u3001\u9634\u90e8\u6c57\u51fa\uff0c\u751a<br>\u6216 \u8863\u670d\u9ec4\u67d3\u3002\u82e5\u601d\u8651\u70e6\u52b3\u8fc7\u5ea6\uff0c\u8017\u4f24\u5fc3\u8840\uff0c\u9634\u8840\u4e0d\u8db3\uff0c\u865a\u706b\u5185\u751f\uff0c<br>\u8feb\u6d25\u5916\u6cc4\uff0c\u800c\u81f4\u6c57\u51fa\uff0c\u8868\u73b0\u4e3a\u76d7 \u6c57\u6216\u81ea\u6c57\u3002\n\n"
                    }
                },
                {
                    "content": "\u6c14\u7684\u56fa\u6444\u4f5c\u7528\uff0c\u6307\u6c14\u5bf9\u4f53\u5185\u6db2\u6001\u7269\u8d28\u7684\u56fa\u62a4\u3001\u7edf\u6444\u548c\u63a7\u5236\uff0c\u4e0d\u4f7f\u5176\u65e0\u6545\u4e22\u5931\u7684\u4f5c\u7528\u3002\u4e3b\u8981\u4f53 \u73b0\u4e8e\uff1a\u2460\u56fa\u6444\u8840\u6db2\uff0c\u9632\u6b62\u5176\u9038\u51fa\u8109\u5916\uff0c\u7ef4\u6301\u5176\u6b63\u5e38\u5faa\u884c\uff1b\u2461\u56fa\u6444\u6c57\u6db2\u3001\u5c3f\u6db2\u3001\u80c3\u6db2\u3001\u80a0\u6db2\u7b49\uff0c\u9632 \u6b62\u5176\u4e22\u5931\uff1a\u2462\u56fa\u6444\u7cbe\u6db2\uff0c\u9632\u6b62\u5984\u6cc4\u3002\n\n\u53ef\u5bfc\u81f4\u81ea\u6c57\u3001\u591a\u5c3f\u3001\u5c0f\u4fbf\u5931\u7981\u3001\u6d41\u6d8e\u3001\u6cdb\u5410\u6e05\u6c34\u3001\u6cfb\u4e0b\u6ed1\u8131\uff1a\u6c14\u4e0d\u56fa\u7cbe\uff0c\u53ef\u51fa\u73b0\u9057\u7cbe\u3001\u6ed1\u7cbe\u3001\u65e9 \u6cc4\uff1a\u6c14\u865a\u800c\u51b2\u4efb\u4e0d\u56fa\uff0c\u53ef\u51fa\u73b0\u65e9\u4ea7\u3001\u6ed1\u80ce\u7b49\u3002\n\n\u56fa\u6444\u4f5c\u7528\u548c\u63a8\u52a8\u4f5c\u7528\u662f\u76f8\u53cd\u76f8\u6210\u7684\u4e24\u4e2a\u65b9\u9762\u3002\u4e00\u65b9\u9762\uff0c\u6c14\u63a8\u52a8\u8840\u6db2\u7684\u8fd0\u884c\u548c\u6d25\u6db2\u7684\u8f93\u5e03\u3001\u6392 \u6cc4\uff1b\u53e6\u4e00\u65b9\u9762\uff0c\u6c14\u53c8\u56fa\u6444\u4f53\u5185\u6db2\u6001\u7269\u8d28\uff0c\u9632\u6b62\u5176\u65e0\u6545\u6d41\u5931\u3002\u4e24\u8005\u76f8\u4e92\u534f\u8c03\uff0c\u63a7\u5236\u548c\u8c03\u8282\u7740\u4f53\u5185\u6db2 \u6001\u7269\u8d28\u7684\u6b63\u5e38\u8fd0\u884c\u3001\u8f93\u5e03\u548c\u6392\u6cc4\uff0c\u8fd9\u662f\u7ef4\u6301\u4eba\u4f53\u6b63\u5e38\u7684\u8840\u6db2\u5faa\u884c\u548c\u6d25\u6db2\u4ee3\u8c22\u7684\u91cd\u8981\u73af\u8282\u3002\n\n",
                    "id": "\u4e2d\u533b\u57fa\u7840\u7406\u8bba\u5b66--\u7b2c\u56db\u7ae0 \u7cbe\u6c14\u8840\u6d25\u6db2\u795e--\u7b2c\u4e8c\u8282 \u6c14--\u56db\u3001\u4eba\u4f53\u4e4b\u6c14\u7684\u529f\u80fd--\uff08\u56db\uff09\u56fa\u6444\u4f5c\u7528",
                    "name": "\uff08\u56db\uff09\u56fa\u6444\u4f5c\u7528",
                    "itemStyle": {
                        "color": "blue"
                    },
                    "tooltip": {
                        "position": "right",
                        "formatter": "\u4e2d\u533b\u57fa\u7840\u7406\u8bba\u5b66--\u7b2c\u56db\u7ae0 \u7cbe\u6c14\u8840\u6d25\u6db2\u795e--\u7b2c\u4e8c\u8282 \u6c14--\u56db\u3001<br>\u4eba\u4f53\u4e4b\u6c14\u7684\u529f\u80fd--\uff08\u56db\uff09\u56fa\u6444\u4f5c\u7528<br><br>\u6c14\u7684\u56fa\u6444\u4f5c\u7528<br>\uff0c\u6307\u6c14\u5bf9\u4f53\u5185\u6db2\u6001\u7269\u8d28\u7684\u56fa\u62a4\u3001\u7edf\u6444\u548c\u63a7\u5236\uff0c\u4e0d\u4f7f\u5176\u65e0\u6545\u4e22\u5931\u7684\u4f5c\u7528<br>\u3002\u4e3b\u8981\u4f53 \u73b0\u4e8e\uff1a\u2460\u56fa\u6444\u8840\u6db2\uff0c\u9632\u6b62\u5176\u9038\u51fa\u8109\u5916\uff0c\u7ef4\u6301\u5176\u6b63\u5e38\u5faa\u884c\uff1b<br>\u2461\u56fa\u6444\u6c57\u6db2\u3001\u5c3f\u6db2\u3001\u80c3\u6db2\u3001\u80a0\u6db2\u7b49\uff0c\u9632 \u6b62\u5176\u4e22\u5931\uff1a\u2462\u56fa\u6444\u7cbe\u6db2\uff0c\u9632<br>\u6b62\u5984\u6cc4\u3002\n\n\u53ef\u5bfc\u81f4\u81ea\u6c57\u3001\u591a\u5c3f\u3001\u5c0f\u4fbf\u5931\u7981\u3001\u6d41\u6d8e\u3001\u6cdb\u5410\u6e05\u6c34\u3001\u6cfb\u4e0b<br>\u6ed1\u8131\uff1a\u6c14\u4e0d\u56fa\u7cbe\uff0c\u53ef\u51fa\u73b0\u9057\u7cbe\u3001\u6ed1\u7cbe\u3001\u65e9 \u6cc4\uff1a\u6c14\u865a\u800c\u51b2\u4efb\u4e0d\u56fa\uff0c\u53ef<br>\u51fa\u73b0\u65e9\u4ea7\u3001\u6ed1\u80ce\u7b49\u3002\n\n\u56fa\u6444\u4f5c\u7528\u548c\u63a8\u52a8\u4f5c\u7528\u662f\u76f8\u53cd\u76f8\u6210\u7684\u4e24\u4e2a\u65b9\u9762<br>\u3002\u4e00\u65b9\u9762\uff0c\u6c14\u63a8\u52a8\u8840\u6db2\u7684\u8fd0\u884c\u548c\u6d25\u6db2\u7684\u8f93\u5e03\u3001\u6392 \u6cc4\uff1b\u53e6\u4e00\u65b9\u9762\uff0c\u6c14<br>\u53c8\u56fa\u6444\u4f53\u5185\u6db2\u6001\u7269\u8d28\uff0c\u9632\u6b62\u5176\u65e0\u6545\u6d41\u5931\u3002\u4e24\u8005\u76f8\u4e92\u534f\u8c03\uff0c\u63a7\u5236\u548c\u8c03\u8282<br>\u7740\u4f53\u5185\u6db2 \u6001\u7269\u8d28\u7684\u6b63\u5e38\u8fd0\u884c\u3001\u8f93\u5e03\u548c\u6392\u6cc4\uff0c\u8fd9\u662f\u7ef4\u6301\u4eba\u4f53\u6b63\u5e38\u7684\u8840<br>\u6db2\u5faa\u884c\u548c\u6d25\u6db2\u4ee3\u8c22\u7684\u91cd\u8981\u73af\u8282\u3002\n\n"
                    }
                },
                {
                    "content": "\u6c14\u80fd\u6444\u6d25 \u6c14\u80fd\u6444\u6d25,\u662f\u6307\u6c14\u7684\u56fa\u6444\u4f5c\u7528\u63a7\u5236\u7740\u6d25\u6db2\u7684\u5206\u6ccc\u548c\u6392\u6cc4,\u4f7f\u4f53\u5185\u6d25\u6db2\u91cf\u4fdd\u6301\u76f8\u5bf9\u6052\u5b9a\uff0c\u4ee5\u7ef4\u6301\u6d25\u6db2\u7684\u4ee3\u8c22\u5e73\u8861\u3002\u82e5\u6c14\u865a\uff0c\u56fa\u6444\u65e0\u529b\uff0c\u5219\u53ef\u81f4\u591a\u6c57\u3001\u81ea\u6c57\u3001\u591a\u5c3f\u3001\u9057\u5c3f\u7b49\u3002\u6240\u4ee5\u4e34\u5e8a\u4e0a\u5e38\u91c7 \u7528\u8865\u6c14\u65b9\u6cd5\u4ee5\u63a7\u5236\u6d25\u6db2\u7684\u8fc7\u591a\u5916\u6cc4\u3002\n\n",
                    "id": "\u4e2d\u533b\u5b66--\u7b2c\u4e09\u7ae0 \u85cf\u8c61\u5b66\u8bf4--\u7b2c\u4e09\u8282 \u7cbe\u3001\u6c14\u3001\u8840\u3001\u6d25\u6db2\u3001\u795e--\u516d\u3001\u7cbe\u3001\u6c14\u3001\u8840\u3001\u6d25\u6db2\u3001\u795e\u4e4b\u95f4\u7684\u76f8\u4e92\u5173\u7cfb--\uff08\u4e8c\uff09 \u6c14\u4e0e\u6d25\u6db2\u7684\u76f8\u4e92\u5173\u7cfb--3.\u6c14\u80fd\u6444\u6d25",
                    "name": "3.\u6c14\u80fd\u6444\u6d25",
                    "itemStyle": {
                        "color": "blue"
                    },
